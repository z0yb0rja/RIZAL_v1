version: '3.9'

services:
  db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastapi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: valid8-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: backend_v2
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fastapi_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - LOGIN_URL=http://localhost:5173
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-false}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@valid8.local}
      - MFA_ENABLED=${MFA_ENABLED:-false}
      - SCHOOL_LOGO_STORAGE_DIR=/tmp/valid8_school_logos
      - SCHOOL_LOGO_MAX_FILE_SIZE_MB=2
    volumes:
      - ./backend:/app
      - import_storage:/tmp/valid8_imports
      - branding_storage:/tmp/valid8_school_logos
    restart: unless-stopped
    depends_on:
      - db
      - redis

  worker:
    build: ./backend
    container_name: backend_worker_v2
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fastapi_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - LOGIN_URL=http://localhost:5173
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-false}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@valid8.local}
      - MFA_ENABLED=${MFA_ENABLED:-false}
      - SCHOOL_LOGO_STORAGE_DIR=/tmp/valid8_school_logos
      - SCHOOL_LOGO_MAX_FILE_SIZE_MB=2
    volumes:
      - ./backend:/app
      - import_storage:/tmp/valid8_imports
      - branding_storage:/tmp/valid8_school_logos
    restart: unless-stopped
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    container_name: frontend_v2
    ports:
      - "5173:5173"
    depends_on:
      - backend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
  import_storage:
  branding_storage:
